<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>New entry · Jang Heritage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          paper: '#FAF6EF', 'paper-warm': '#F5EFE0', surface: '#FFFFFF',
          ink: '#2A1F1A', 'ink-soft': '#6B5D52', 'ink-faint': '#9C8E81',
          seal: '#8B2D29', 'seal-soft': '#B25652',
          gold: '#A8843E', 'gold-soft': '#C9A865',
          'border-soft': '#E5DCC8', 'border-strong': '#C8B998'
        }
      }}
    }
  </script>
  <link rel="stylesheet" href="_shared.css">
  <style>
    /* Viewport-locked editor: header (56px) + main (1fr) = 100vh. No footer; metadata lives on the document page. */
    body { overflow: hidden; height: 100vh; }
    .edit-shell { display: grid; grid-template-rows: 56px 1fr; height: 100vh; }
    .edit-main { overflow: hidden; min-height: 0; }

    /* Every pane (image, chinese, english) shares the same internal grid:
       header on top (auto), body fills the rest (1fr). */
    .pane { display: grid !important; grid-template-rows: auto 1fr; min-height: 0 !important; overflow: hidden; }
    .pane-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.625rem 1rem; border-bottom: 1px solid var(--border-soft);
      background: var(--paper-warm); font-size: 0.8125rem;
    }
    .pane-body { padding: 1.5rem; min-height: 0; overflow: auto; }

    /* Image pane: scroll-area scrolls vertically; image fills width, natural height. */
    .image-pane > .scroll-area { min-height: 0; overflow-y: auto; overflow-x: hidden; }
    .image-pane img.scan { width: 100%; height: auto; display: block; }

    /* The text-panes wrapper contributes nothing to layout, in both modes. */
    .text-panes { display: contents !important; }

    textarea.editor {
      width: 100%; height: 100%;
      resize: none; border: 0; background: transparent; outline: none;
      font-size: 1rem; line-height: 1.3; color: var(--ink);
    }
    textarea.editor:focus { background: rgba(255,255,255,0.55); }

    /* Per-pane text size adjusters, styled like .pill-btn */
    .size-btn {
      min-width: 1.6rem;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      border: 1px solid var(--border-soft);
      background: var(--surface);
      color: var(--ink-soft);
      cursor: pointer; font-weight: 600; line-height: 1;
    }
    .size-btn:hover { background: var(--paper-warm); color: var(--ink); }
    .size-btn[data-action="dec"] { font-size: 0.7rem; }
    .size-btn[data-action="inc"] { font-size: 0.95rem; }

    /* Wide (>=1280px): three columns image | 中文 | English. */
    @media (min-width: 1280px) {
      .edit-main {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 1px;
        background: var(--border-soft);
      }
      .pane { background: var(--paper); }
    }

    /* Narrow (<1280px): three stacked rows at 20% / 40% / 40% of edit-main. */
    @media (max-width: 1279.98px) {
      .edit-main {
        display: grid;
        grid-template-rows: 20% 40% 40%;
        grid-template-columns: 1fr;
        gap: 1px;
        background: var(--border-soft);
      }
      .pane { background: var(--paper); }
    }
  </style>
</head>
<body class="font-sans">

<div class="edit-shell">

  <!-- COMPACT HEADER -->
  <header class="border-b border-[color:var(--border-soft)] bg-paper flex items-center px-4 gap-4">
    <a href="document.html" class="text-ink-soft hover:text-ink text-sm flex items-center gap-1">
      <span>←</span> Back
    </a>
    <div class="h-6 w-px bg-[color:var(--border-soft)]"></div>
    <div class="flex-1 min-w-0">
      <input type="text" value="" placeholder="Untitled. Add a title or come back to it later."
        class="w-full max-w-xl bg-transparent border-0 font-serif-content text-lg focus:outline-none focus:bg-white focus:rounded focus:px-2 focus:py-0.5">
    </div>
    <span class="save-status" style="opacity:0.5"><span class="dot" style="background:#9C8E81"></span>Not yet saved</span>
    <div class="h-6 w-px bg-[color:var(--border-soft)]"></div>
    <button class="pill-btn">History</button>
    <div class="w-8 h-8 rounded-full bg-seal text-white flex items-center justify-center text-sm font-medium">B</div>
  </header>

  <!-- THREE-COLUMN MAIN (responsive) -->
  <div class="edit-main">

    <!-- IMAGE PANE -->
    <div class="image-pane pane">
      <div class="pane-header">
        <div class="flex items-center gap-2">
          <button class="pill-btn">←</button>
          <span class="text-ink-soft">No scans yet</span>
          <button class="pill-btn">→</button>
        </div>
        <div class="flex items-center gap-1.5">
          <button class="pill-btn">−</button>
          <button class="pill-btn">100%</button>
          <button class="pill-btn">+</button>
          <button class="pill-btn">⛶</button>
          <button class="pill-btn">⤓</button>
        </div>
      </div>
      <div class="scroll-area overflow-auto bg-paper-warm flex items-start justify-center p-4">
        <div class="w-full h-full flex items-center justify-center p-8">
          <label class="w-full max-w-md aspect-[3/4] flex flex-col items-center justify-center text-center border-2 border-dashed border-[color:var(--border-strong)] rounded-lg p-6 hover:border-seal hover:bg-paper-warm transition cursor-pointer">
            <svg class="w-12 h-12 text-ink-soft mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/></svg>
            <div class="font-serif-content text-base mb-1">Drop a scan to begin</div>
            <div class="text-sm text-ink-soft mb-3">or click to choose a file</div>
            <div class="text-xs text-ink-faint">JPEG or TIFF, up to 50 MB. Add more scans after.</div>
            <input type="file" accept="image/jpeg,image/tiff,image/png" class="sr-only">
          </label>
        </div>
      </div>
    </div>

    <!-- TEXT PANES -->
    <div class="text-panes contents">
      <!-- CHINESE -->
      <div class="pane flex flex-col min-h-0">
        <div class="pane-header">
          <div class="flex items-center gap-2">
            <span class="font-cjk text-base">中文录入</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="flex items-center gap-1.5" title="Adjust text size">
              <button class="size-btn" data-action="dec" aria-label="Decrease text size">A</button>
              <button class="size-btn" data-action="inc" aria-label="Increase text size">A</button>
            </div>
            <span class="text-ink-faint text-xs">0 chars</span>
          </div>
        </div>
        <div class="pane-body">
          <textarea class="editor font-cjk" spellcheck="false"></textarea>
        </div>
      </div>

      <!-- ENGLISH -->
      <div class="pane flex flex-col min-h-0">
        <div class="pane-header">
          <div class="flex items-center gap-2">
            <span class="text-base">English</span>
            <span class="text-ink-faint">·</span>
            <span class="text-ink-soft">Translation</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="flex items-center gap-1.5" title="Adjust text size">
              <button class="size-btn" data-action="dec" aria-label="Decrease text size">A</button>
              <button class="size-btn" data-action="inc" aria-label="Increase text size">A</button>
            </div>
            <span class="text-ink-faint text-xs">0 words</span>
          </div>
        </div>
        <div class="pane-body">
          <textarea class="editor font-serif-content" spellcheck="true"></textarea>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.size-btn');
    if (!btn) return;
    const pane = btn.closest('.pane');
    const ta = pane && pane.querySelector('textarea.editor');
    if (!ta) return;
    const current = parseFloat(getComputedStyle(ta).fontSize) || 16;
    const next = btn.dataset.action === 'inc'
      ? Math.min(current + 2, 32)
      : Math.max(current - 2, 12);
    ta.style.fontSize = next + 'px';
  });
</script>

</body>
</html>
